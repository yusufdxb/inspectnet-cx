name: Bug Report
description: Report a reproducible InspectNet-CX issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands, inputs, and outputs.
      value: |
        ```bash
        pytest -q
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, OS, torch, transformers, GPU, and optional dependencies.
    validations:
      required: true
