name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: pytest -q
      - name: HF package checker
        run: PYTHONPATH=src python scripts/check_hf_package.py
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m pip install twine && twine check dist/*
